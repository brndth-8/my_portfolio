<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bernadeth Soriano — IT Student · Capstone Developer · Future Network Engineer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph -->
  <meta property="og:title" content="Bernadeth Soriano · IT Student & Developer">
  <meta property="og:description" content="3rd-year BSIT student at STI-SJDM. Passionate about solving problems and building toward a career in network engineering.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bernadeth Soriano">

  <title>Bernadeth Soriano · Portfolio</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0A0D1A;
      overflow: hidden;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0A0D1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loader-logo {
      font-family: monospace;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 32px;
    }
    .loader-logo span { color: #64B5F6; }
    .loader-bar {
      width: 120px;
      height: 2px;
      background: #1A2035;
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, #64B5F6, #90CAF9);
      border-radius: 2px;
      animation: fill 1.8s ease forwards;
    }
    @keyframes fill {
      from { width: 0%; }
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-logo">Bernadeth<span>.</span>dev</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      const screen = document.getElementById('loading-screen');
      screen.classList.add('fade-out');
      setTimeout(() => screen.remove(), 600);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
