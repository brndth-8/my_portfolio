name: portfolio
description: Personal Portfolio Website
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  url_launcher: ^6.2.5
  animated_text_kit: ^4.2.2
  visibility_detector: ^0.4.0+2
